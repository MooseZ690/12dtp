{% extends "layout.html" %}
{% block body %}

<div class="three-column">
    {% for planes in results %}
    <div>
        <a href="{{ url_for('plane', id=planes[0]) }}">
            <img src="{{ planes[3] }}" alt="{{ planes[2] }}">
            <h2><b>{{ planes[1] }} {{ planes[2] }}</b></h2>
            <p>
                Click to view details about the {{ planes[1] }} {{ planes[2] }}
            </p>
        </a>
    </div>
    {% endfor %}
</div>

{% endblock %}
